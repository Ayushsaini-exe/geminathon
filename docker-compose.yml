version: "3.9"

services:
  app:
    build: .
    container_name: agrofix-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./reports:/app/reports
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: agrofix-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrofix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agrofix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
