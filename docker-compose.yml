version: "3.9"

services:
  app:
    build: .
    container_name: agrofix-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./reports:/app/reports
      - ./uploads:/app/uploads
      - ./agrofix.db:/app/agrofix.db
    restart: unless-stopped
